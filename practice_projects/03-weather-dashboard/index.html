<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Search Header -->
        <header class="search-header">
            <h1 class="app-title">🌤️ Weather Dashboard</h1>
            <div class="search-container">
                <input 
                    type="text" 
                    id="city-input" 
                    class="city-input" 
                    placeholder="Search for a city..."
                    aria-label="Search city"
                >
                <button id="search-btn" class="search-btn" aria-label="Search">🔍</button>
                <button id="location-btn" class="location-btn" aria-label="Use my location">📍</button>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error hidden">
            <p id="error-message"></p>
        </div>

        <!-- Main Content -->
        <main id="weather-content" class="weather-content hidden">
            <!-- Current Weather -->
            <section class="current-weather">
                <div class="weather-main">
                    <div class="location-info">
                        <h2 id="city-name">--</h2>
                        <p id="current-date">--</p>
                    </div>
                    <div class="weather-icon-wrapper">
                        <img id="weather-icon" src="" alt="Weather icon" class="weather-icon">
                        <p id="weather-description" class="weather-description">--</p>
                    </div>
                </div>
                
                <div class="temperature-wrapper">
                    <span id="temperature" class="temperature">--°</span>
                    <span class="temperature-unit">C</span>
                </div>
                
                <div class="weather-details">
                    <div class="detail-card">
                        <span class="detail-icon">🌡️</span>
                        <span class="detail-label">Feels Like</span>
                        <span id="feels-like" class="detail-value">--°</span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-icon">💧</span>
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value">--%</span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-icon">💨</span>
                        <span class="detail-label">Wind</span>
                        <span id="wind-speed" class="detail-value">-- km/h</span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-icon">📊</span>
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value">-- hPa</span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-icon">👁️</span>
                        <span class="detail-label">Visibility</span>
                        <span id="visibility" class="detail-value">-- km</span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-icon">☀️</span>
                        <span class="detail-label">Sunrise</span>
                        <span id="sunrise" class="detail-value">--:--</span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-icon">🌙</span>
                        <span class="detail-label">Sunset</span>
                        <span id="sunset" class="detail-value">--:--</span>
                    </div>
                </div>
            </section>

            <!-- Forecast -->
            <section class="forecast">
                <h3 class="forecast-title">5-Day Forecast</h3>
                <div id="forecast-grid" class="forecast-grid">
                    <!-- Forecast cards will be inserted here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
